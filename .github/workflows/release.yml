name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Checkout dashboard frontend
        uses: actions/checkout@v4
        with:
          repository: lavondev/inferencache-ui
          path: inferencache-dashboard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: inferencache-dashboard/frontend-next/package-lock.json

      - name: Build and embed dashboard
        env:
          DASHBOARD_REPO: ${{ github.workspace }}/inferencache-dashboard
          INFERENCACHE_REPO: ${{ github.workspace }}
        run: ./scripts/build-dashboard.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      # Uncomment when PyPI credentials are configured:
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
